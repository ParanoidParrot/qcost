name: CI

on:
  push:
    branches: [main]
    tags:     ['v*']
  pull_request:
    branches: [main]

jobs:
  test:
    name: Test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.10', '3.11', '3.12']
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Debug — show repo structure
        run: |
          echo "=== root ===" && ls -la
          echo "=== qcost/ ===" && ls -la qcost/ || echo "qcost/ dir MISSING"
          echo "=== qcost/__init__.py ===" && cat qcost/__init__.py || echo "__init__.py MISSING"

      - name: Install package
        run: pip install --no-cache-dir -e ".[dev]"

      - name: Debug — show install location
        run: |
          python -c "import qcost; print('file:', getattr(qcost, '__file__', 'UNKNOWN'))"
          pip show qcost

      - name: Verify imports
        run: python -c "from qcost import run_file, run_sql, build_report; print('imports ok')"

      - name: Lint
        run: ruff check qcost tests

      - name: Type check
        run: mypy qcost/ --ignore-missing-imports

      - name: Run tests
        run: pytest tests/ -v --cov=qcost --cov-report=term-missing

  self-test:
    name: Self-test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Debug — show repo structure
        run: |
          echo "=== root ===" && ls -la
          echo "=== qcost/ ===" && ls -la qcost/ || echo "qcost/ dir MISSING"
          echo "=== qcost/__init__.py ===" && cat qcost/__init__.py || echo "__init__.py MISSING"

      - name: Install package
        run: pip install --no-cache-dir -e ".[dev]"

      - name: Debug — show install location
        run: |
          python -c "import qcost; print('file:', getattr(qcost, '__file__', 'UNKNOWN'))"
          pip show qcost

      - name: Verify imports
        run: python -c "from qcost import run_file, run_sql, build_report; print('imports ok')"

      - name: Create test data
        run: |
          mkdir -p testdata/postgres
          cat > testdata/postgres/bad_queries.sql << 'SQL'
          SELECT * FROM users;
          SELECT u.name, o.total FROM users u, orders o WHERE u.id = 1;
          SELECT id FROM users WHERE email LIKE '%@gmail.com';
          SQL

      - name: Run self-test
        run: |
          python -c "
          from qcost import run_file, build_report
          from qcost.config import Config
          cfg = Config()
          results = run_file('testdata/postgres/bad_queries.sql', cfg)
          report = build_report(results, cfg)
          print(f'Found {len(results)} queries, total score {report.total_cost}')
          assert len(results) > 0, 'Expected at least one query'
          print('Self-test passed.')
          "