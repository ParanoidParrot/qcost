name: CI

on:
  push:
    branches: [main]
    tags:     ['v*']
  pull_request:
    branches: [main]

jobs:
  test:
    name: Test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.10', '3.11', '3.12']
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install package and dev dependencies
        run: pip install --no-cache-dir -e ".[dev]"

      - name: Verify imports
        run: python -c "from qcost import run_file, run_sql, build_report; print('imports ok')"

      - name: Lint
        run: ruff check qcost tests

      - name: Type check
        run: mypy qcost/ --ignore-missing-imports

      - name: Run tests
        run: pytest tests/ -v --cov=qcost --cov-report=term-missing

  self-test:
    name: Self-test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install package
        run: pip install --no-cache-dir -e ".[dev]"

      - name: Verify imports
        run: python -c "from qcost import run_file, run_sql, build_report; print('imports ok')"

      - name: Run self-test on bad queries
        run: |
          python -c "
          from qcost import run_file, build_report
          from qcost.config import Config
          cfg = Config()
          results = run_file('testdata/postgres/bad_queries.sql', cfg)
          report = build_report(results, cfg)
          print(f'Found {len(results)} queries, total score {report.total_cost}')
          assert len(results) > 0, 'Expected queries in bad_queries.sql'
          assert report.total_cost > 0, 'Expected non-zero cost score for bad queries'
          print('bad queries self-test passed.')
          "

      - name: Run self-test on good queries
        run: |
          python -c "
          from qcost import run_file, build_report
          from qcost.config import Config
          cfg = Config()
          results = run_file('testdata/postgres/good_queries.sql', cfg)
          report = build_report(results, cfg)
          print(f'Found {len(results)} queries, total score {report.total_cost}')
          assert len(results) > 0, 'Expected queries in good_queries.sql'
          assert report.pass_gate, f'Good queries should pass gate, got score {report.total_cost}'
          print('good queries self-test passed.')
          "